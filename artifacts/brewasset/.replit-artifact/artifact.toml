kind = "web"
previewPath = "/"
title = "BrewAsset POS & WMS"
version = "1.0.0"
id = "artifacts/brewasset"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24688
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/brewasset run dev"

[services.env]
PORT = "24688"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/brewasset", "run", "build"]
publicDir = "artifacts/brewasset/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
